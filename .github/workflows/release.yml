name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ".[dev]"

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed --name "PomodoroTimer"
          --icon=icon.ico
          --add-data "icon.ico;."
          main.py

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} `
            dist/PomodoroTimer.exe `
            Output/PomodoroTimer-Setup-$("${{ github.ref_name }}".TrimStart('v')).exe `
            --title "${{ github.ref_name }}" `
            --generate-notes
